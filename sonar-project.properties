sonar.projectKey=django-notes-app
sonar.projectName=Django Notes App
sonar.projectVersion=1.0

# Scan only your Django apps
sonar.sources=api,mynotes,notesapp

# Encoding and language
sonar.sourceEncoding=UTF-8
sonar.language=py
sonar.python.version=3.10

# Coverage report generated by pytest
sonar.python.coverage.reportPaths=coverage.xml

# Exclusions
sonar.exclusions=**/migrations/**,**/__pycache__/**,**/venv/**,**/nginx/**,**/staticfiles/**
