apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-app
  namespace: demo-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: demo-app
  template:
    metadata:
      labels:
        app: demo-app
    spec:
      containers:
      - name: demo-app-container
        image: mahipalmehta10/django-notes-app:latest
        env:
        - name: DB_HOST
          value: mysql.demo-app.svc.cluster.local
        - name: DB_NAME
          value: test_db
        - name: DB_USER
          value: root
        - name: DB_PASSWORD
          value: root
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: demo-app-service
  namespace: demo-app
spec:
  selector:
    app: demo-app
  ports:
    - port: 80
      targetPort: 8080
  type: ClusterIP


